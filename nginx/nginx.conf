events {}

http {

    upstream api_backend {
        server 172.19.0.2:3000;
        server 172.19.0.5:3000;
        server 172.19.0.6:3000;
    }

    server {

        listen 80;

        location /api {
            proxy_pass http://api_backend;
        }

        location /admin {
            proxy_pass http://admin:4000;
        }
    }
}
