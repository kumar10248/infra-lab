- name: Login to Docker Hub
  uses: docker/login-action@v3
  with:
    username: ${{ secrets.DOCKER_USERNAME }}
    password: ${{ secrets.DOCKER_PASSWORD }}

- name: Build API Image
  run: |
    docker build \
      -t ${{ secrets.DOCKER_USERNAME }}/infra-lab-api:latest \
      ./api-server

- name: Push API Image
  run: |
    docker push \
      ${{ secrets.DOCKER_USERNAME }}/infra-lab-api:latest

- name: Build Admin Image
  run: |
    docker build \
      -t ${{ secrets.DOCKER_USERNAME }}/infra-lab-admin:latest \
      ./admin-server

- name: Push Admin Image
  run: |
    docker push \
      ${{ secrets.DOCKER_USERNAME }}/infra-lab-admin:latest
