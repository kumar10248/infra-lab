name: Infra Lab CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Compose
        run: docker compose config

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build API Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/infra-lab-api:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/infra-lab-api:${{ github.sha }} \
            ./api-server

      - name: Push API Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/infra-lab-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/infra-lab-api:${{ github.sha }}

      - name: Build Admin Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/infra-lab-admin:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/infra-lab-admin:${{ github.sha }} \
            ./admin-server

      - name: Push Admin Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/infra-lab-admin:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/infra-lab-admin:${{ github.sha }}
